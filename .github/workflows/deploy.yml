name: Deploy to CloudBase Static Hosting

on:
  push:
    branches:
      - main # 如果你的主分支叫 master，请把这里改成 master
  pull_request:
    branches:
      - main # 同上

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 依然需要 Node.js 环境来安装腾讯云的 CLI 工具
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install CloudBase CLI
      run: npm install -g @cloudbase/cli

    - name: Login CloudBase CLI
      run: tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }}

    # 注意这里：直接部署当前目录 (./) 到云端的根目录 (/)
    - name: Deploy to CloudBase Static Hosting
      run: tcb hosting deploy ./ / -e ${{ secrets.TCB_ENV_ID }}